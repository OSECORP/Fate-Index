<!DOCTYPE html>
<html>
<head>
  <title>SIGMA PRIME 4.0 — Vault Sigma</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
    // Регистрация клика для активации портала
    AFRAME.registerComponent('portal-click', {
      init: function () {
        this.el.addEventListener('click', () => {
          alert('LIMINΔ-TRUTH-077 activated! Enter vault.nonilliard.eth/liminal');
        });
      }
    });
  </script>
</head>
<body>
  <a-scene cursor="rayOrigin: mouse">
    <!-- Фон: Фрактальное звёздное небо -->
    <a-sky color="#000000" material="shader: flat; side: double"></a-sky>

    <!-- Страница 1: Манифест -->
    <a-text
      value="SIGMA EROTICA\nThe Living Reality"
      position="0 3 -5"
      align="center"
      color="#00ffcc"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      animation="property: color; to: #ff007a; dur: 2000; loop: true; dir: alternate"
    ></a-text>
    <a-box
      position="0 1 -5"
      width="1" height="1" depth="1"
      material="color: #00ffcc; opacity: 0.7"
      animation="property: rotation; to: 360 360 360; dur: 10000; loop: true"
    >
      <a-text value="N" position="0 0 0.6" color="#ff007a" align="center"></a-text>
    </a-box>

    <!-- Страница 2: Архитектура -->
    <a-text
      value="Архитектура\nVault Sigma"
      position="-10 3 -10"
      align="center"
      color="#ff007a"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      animation="property: color; to: #00ffcc; dur: 2000; loop: true; dir: alternate"
    ></a-text>
    <a-sphere
      position="-10 1 -10"
      radius="0.5"
      material="color: #00ffcc; shader: flat"
      animation="property: material.color; to: #ff007a; dur: 2000; loop: true; dir: alternate"
    ></a-sphere>
    <a-sphere
      position="-9 1 -10"
      radius="0.3"
      material="color: #ff007a; shader: flat"
    ></a-sphere>
    <a-sphere
      position="-11 1 -10"
      radius="0.3"
      material="color: #ff007a; shader: flat"
    ></a-sphere>
    <a-cylinder
      position="-10 1 -10"
      radius="0.05"
      height="2"
      material="color: #00ffcc; opacity: 0.5"
      rotation="0 0 90"
    ></a-cylinder>

    <!-- Страница 3: Органы -->
    <a-text
      value="Органы\nEcho Fragment #001"
      position="10 3 -15"
      align="center"
      color="#00ffcc"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      animation="property: color; to: #ff007a; dur: 2000; loop: true; dir: alternate"
    ></a-text>
    <a-box
      position="10 1 -15"
      width="0.8" height="0.8" depth="0.8"
      material="color: #00ffcc; opacity: 0.7"
      animation="property: scale; to: 1.2 1.2 1.2; dur: 2000; loop: true; dir: alternate"
    >
      <a-text value="I chose desire." position="0 0 0.5" color="#ff007a" align="center" scale="0.5 0.5 0.5"></a-text>
    </a-box>
    <a-sphere
      position="12 1 -15"
      radius="0.6"
      material="color: #ff007a; shader: flat"
      animation="property: material.color; to: #00ffcc; dur: 2000; loop: true; dir: alternate"
    >
      <a-text value="Rosa Vetrum" position="0 0 0.7" color="#00ffcc" align="center" scale="0.5 0.5 0.5"></a-text>
    </a-sphere>

    <!-- Страница 4: Порталы -->
    <a-text
      value="Порталы\nLIMINAL NODE"
      position="0 3 -20"
      align="center"
      color="#ff007a"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      animation="property: color; to: #00ffcc; dur: 2000; loop: true; dir: alternate"
    ></a-text>
    <a-ring
      position="0 1 -20"
      radius-inner="1"
      radius-outer="1.5"
      material="color: #00ffcc; shader: flat"
      animation="property: rotation; to: 0 360 0; dur: 5000; loop: true"
      portal-click
    >
      <a-text value="Enter the node" position="0 0 0.1" color="#ff007a" align="center" rotation="0 0 -90"></a-text>
    </a-ring>

    <!-- Камера -->
    <a-camera position="0 1.6 0" wasd-controls="enabled: true"></a-camera>
  </a-scene>
</body>
</html>
