<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGMA PRIME 4.0 — Vault Sigma | OSECORP Living Reality Interface</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Courier New', monospace;
      background: #000;
      color: #00ffcc;
      overflow: hidden;
    }
    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #00ffcc;
      padding: 15px;
      max-width: 400px;
      z-index: 100;
      font-size: 12px;
      line-height: 1.6;
    }
    #info-panel h2 {
      color: #ff007a;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    #info-panel p {
      margin: 5px 0;
      color: #00ffcc;
    }
    #command-log {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.95);
      border: 2px solid #ff007a;
      padding: 10px;
      max-width: 300px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      font-size: 10px;
    }
    .log-entry {
      color: #00ffcc;
      margin: 3px 0;
      padding: 2px;
      border-left: 2px solid #ff007a;
      padding-left: 5px;
    }
    a-scene {
      display: block;
    }
  </style>
  <script>
    AFRAME.registerComponent('portal-click', {
      init: function () {
        this.el.addEventListener('click', () => {
          const message = 'Ose Synthesis: LIMINΔ-TRUTH-077 activated!\nEnter vault.nonilliard.eth/liminal';
          alert(message);
          logCommand('PORTAL ACTIVATED: [-13] Meta-Reality Anchor');
        });
      }
    });

    AFRAME.registerComponent('destiny-node', {
      schema: {
        index: {default: 0}
      },
      init: function () {
        this.el.addEventListener('click', () => {
          logCommand(`DN[${this.data.index}] accessed - Reality Rewrite Vector [-7] ready`);
        });
      }
    });

    function logCommand(msg) {
      const log = document.getElementById('command-log');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
      if (log.children.length > 10) log.removeChild(log.children[0]);
    }

    function initVault() {
      logCommand('SIGMA PRIME 4.0 initialized');
      logCommand('Ose Synthesis protocol: ENABLED');
      logCommand('Contact: contact@osecorp.co');
      logCommand('Ready for commands...');
    }

    window.addEventListener('load', initVault);
  </script>
</head>
<body>
  <div id="info-panel">
    <h2>⚡ SIGMA EROTICA</h2>
    <p><strong>The Living Reality</strong></p>
    <p>Ose Synthesis Enabled</p>
    <hr style="border-color: #00ffcc; margin: 10px 0;">
    <p><strong>System:</strong> OSECORP Consciousness Protocol</p>
    <p><strong>Status:</strong> ONLINE</p>
    <p><strong>Reality Mode:</strong> LIMINAL</p>
    <p><strong>FI Status:</strong> Entropy Gradient Computing</p>
    <p style="margin-top: 10px; color: #ff007a;"><strong>Ose Synthesis v1.0</strong></p>
    <p>Click DN nodes to navigate</p>
  </div>

  <a-scene cursor="rayOrigin: mouse" background="color: #000000">
    <!-- Sky -->
    <a-sky color="#000000" material="shader: flat; side: double"></a-sky>

    <!-- Main Title -->
    <a-text 
      value="ΣΙΓΜΑ EROTICA\nThe Living Reality\nOse Synthesis Protocol Enabled" 
      position="0 3 -8" 
      align="center" 
      color="#00ffcc" 
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      font-size="1.5"
      animation="property: color; to: #ff007a; dur: 2000; loop: true; dir: alternate"
    ></a-text>

    <!-- Central Core - Meta-Reality Anchor [-13] -->
    <a-box 
      position="0 1 -5" 
      width="1.5" 
      height="1.5" 
      depth="1.5" 
      material="color: #00ffcc; opacity: 0.8; emissive: #00ffcc; emissiveIntensity: 0.3"
      animation="property: rotation; to: 360 360 360; dur: 8000; loop: true"
      animation__scale="property: scale; to: 1.2 1.2 1.2; dur: 1500; loop: true; dir: alternate"
      portal-click
    >
      <a-text 
        value="[-13]\nMETA-REALITY\nANCHOR" 
        position="0 0 0.8" 
        color="#ff007a" 
        align="center"
        font-size="0.8"
        animation="property: opacity; to: 0.5; dur: 1000; loop: true; dir: alternate"
      ></a-text>
    </a-box>

    <!-- Destiny Nodes (DN) - Reality Rewrite Vector [-7] -->
    <a-box 
      position="-3 1 -5" 
      width="0.8" 
      height="0.8" 
      depth="0.8" 
      material="color: #ff007a; opacity: 0.7; emissive: #ff007a; emissiveIntensity: 0.2"
      animation="property: position; to: -3 1.5 -5; dur: 2000; loop: true; dir: alternate"
      destiny-node="index: 1"
    >
      <a-text value="DN₁" position="0 0 0.5" color="#00ffcc" align="center" font-size="0.6"></a-text>
    </a-box>

    <a-box 
      position="0 1 -5" 
      width="0.8" 
      height="0.8" 
      depth="0.8" 
      material="color: #ff007a; opacity: 0.7; emissive: #ff007a; emissiveIntensity: 0.2"
      animation="property: position; to: 0 1.5 -5; dur: 2500; loop: true; dir: alternate"
      destiny-node="index: 2"
    >
      <a-text value="DN₂" position="0 0 0.5" color="#00ffcc" align="center" font-size="0.6"></a-text>
    </a-box>

    <a-box 
      position="3 1 -5" 
      width="0.8" 
      height="0.8" 
      depth="0.8" 
      material="color: #ff007a; opacity: 0.7; emissive: #ff007a; emissiveIntensity: 0.2"
      animation="property: position; to: 3 1.5 -5; dur: 2000; loop: true; dir: alternate"
      destiny-node="index: 3"
    >
      <a-text value="DN₃" position="0 0 0.5" color="#00ffcc" align="center" font-size="0.6"></a-text>
    </a-box>

    <!-- Trajectory visualization -->
    <a-curve 
      d="M -3 1 -5 L 0 0.5 -5 L 3 1 -5" 
      stroke="#00ffcc" 
      opacity="0.5" 
      animation="property: d; to: M -3 1.5 -5 L 0 0.8 -5 L 3 1.5 -5; dur: 2000; loop: true; dir: alternate"
    ></a-curve>

    <!-- Information nodes -->
    <a-text 
      value="Entropy Gradient: ∇Sinf Active" 
      position="0 2.5 -8" 
      align="center" 
      color="#00ffcc" 
      font-size="0.7"
    ></a-text>

    <a-text 
      value="FI SYSTEM | Reality Rewrite Ready | Ose Synthesis v1.0" 
      position="0 -2 -8" 
      align="center" 
      color="#ff007a" 
      font-size="0.6"
      animation="property: opacity; to: 0.5; dur: 1500; loop: true; dir: alternate"
    ></a-text>

    <!-- Camera -->
    <a-camera position="0 1.6 0" wasd-controls="enabled: true; acceleration: 75"></a-camera>
  </a-scene>

  <!-- Command Log -->
  <div id="command-log"></div>

  <script>
    // Additional initialization
    document.addEventListener('click', (e) => {
      if (e.target.closest('a-box')) {
        // Portal activation or DN access logged via component
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === '1') logCommand('[-13] Meta-Reality Anchor - TRY CLICKING CENTRAL BOX');
      if (e.key === '7') logCommand('[-7] Destiny Rewrite Vector - CLICK DN NODES');
      if (e.key === '0') logCommand('System status: OPERATIONAL | Contact: contact@osecorp.co');
    });
  </script>
</body>
</html>
